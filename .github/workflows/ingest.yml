name: Ingest and Verify

on:
  schedule:
    # Run weekly on Sundays at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    name: Rebuild database and verify reproducibility
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Rebuild database from seed
        run: node scripts/build-db.js

      - name: Run unit tests
        run: npm test

      - name: Run contract tests
        run: npm run test:contract

      - name: Verify reproducibility
        run: |
          echo "Database rebuild and tests passed."
          echo "Note: this corpus is MANUAL_CURATION (frozen). No new content is expected."
          echo "A clean run with no new content is a valid pass for frozen corpora."
